<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="60" x2="1500" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#041421"/>
      <stop offset="0.5" stop-color="#0A2E2A"/>
      <stop offset="1" stop-color="#103A24"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(360 220) rotate(32) scale(520 420)">
      <stop stop-color="#22D3EE" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1240 640) rotate(-12) scale(560 460)">
      <stop stop-color="#84CC16" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#84CC16" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="batteryStroke" x1="875" y1="240" x2="1270" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A3E635"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="batteryFill" x1="920" y1="300" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22C55E"/>
      <stop offset="1" stop-color="#16A34A"/>
    </linearGradient>
    <linearGradient id="powerFlow" x1="180" y1="420" x2="890" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="0.28" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#84CC16"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glowLeft)"/>
  <rect width="1600" height="900" fill="url(#glowRight)"/>

  <g opacity="0.3">
    <path d="M120 760H1480" stroke="#4D7A74" stroke-width="2"/>
    <path d="M120 680H1480" stroke="#4D7A74" stroke-width="2"/>
    <path d="M120 600H1480" stroke="#4D7A74" stroke-width="2"/>
    <path d="M120 520H1480" stroke="#4D7A74" stroke-width="2"/>
    <path d="M120 440H1480" stroke="#4D7A74" stroke-width="2"/>
    <path d="M120 360H1480" stroke="#4D7A74" stroke-width="2"/>
    <path d="M120 280H1480" stroke="#4D7A74" stroke-width="2"/>
  </g>

  <g filter="url(#softGlow)">
    <path d="M210 470C300 430 420 430 525 470C630 510 750 510 860 450" stroke="url(#powerFlow)" stroke-width="18" stroke-linecap="round"/>
    <circle cx="212" cy="470" r="13" fill="#22D3EE"/>
    <circle cx="860" cy="450" r="15" fill="#84CC16"/>
  </g>

  <g opacity="0.95">
    <rect x="920" y="250" width="320" height="430" rx="34" stroke="url(#batteryStroke)" stroke-width="12"/>
    <rect x="1045" y="220" width="70" height="32" rx="9" fill="#A3E635"/>
    <rect x="945" y="520" width="270" height="135" rx="20" fill="url(#batteryFill)"/>
    <rect x="945" y="380" width="270" height="120" rx="20" fill="#14532D" opacity="0.75"/>
    <rect x="945" y="285" width="270" height="80" rx="20" fill="#14532D" opacity="0.45"/>
  </g>

  <g filter="url(#softGlow)">
    <path d="M1060 420L1018 480H1088L1048 552" stroke="#A3E635" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g opacity="0.9">
    <circle cx="290" cy="300" r="56" stroke="#22D3EE" stroke-width="7"/>
    <path d="M290 268V334" stroke="#22D3EE" stroke-width="7" stroke-linecap="round"/>
    <path d="M257 300H323" stroke="#22D3EE" stroke-width="7" stroke-linecap="round"/>

    <circle cx="420" cy="290" r="56" stroke="#84CC16" stroke-width="7"/>
    <path d="M386 314C416 338 451 340 474 313" stroke="#84CC16" stroke-width="7" stroke-linecap="round"/>
    <path d="M399 282H441" stroke="#84CC16" stroke-width="7" stroke-linecap="round"/>
  </g>

  <text x="160" y="170" fill="#E2FBE8" font-family="Segoe UI, Tahoma, sans-serif" font-size="68" font-weight="700" letter-spacing="1.5">
    Battery Energy
  </text>
  <text x="160" y="248" fill="#B6F3D4" font-family="Segoe UI, Tahoma, sans-serif" font-size="68" font-weight="700" letter-spacing="1.5">
